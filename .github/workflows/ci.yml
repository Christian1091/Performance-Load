name: K6 Performance Testing

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  k6-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v2

      - name: Set up Docker
        uses: docker/setup-buildx-action@v2

      - name: Run K6 tests and export the dashboard
        env:
          K6_WEB_DASHBOARD_EXPORT: ./reports/loadReport.html
        run: |
          mkdir -p ./reports  # Asegura que la carpeta reports exista
          docker run -v $(pwd):/scripts -i grafana/k6 run /scripts/test.js

      - name: Upload K6 report as artifact
        uses: actions/upload-artifact@v3
        with:
          name: loadReport
          path: ./reports/loadReport.html